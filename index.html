<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Persona Intelligence Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Serif+Display:ital@0;1&family=Cormorant+Garamond:ital,wght@1,300;1,400&display=swap" rel="stylesheet">
<!-- Supabase 제거됨 - 메모리 기반으로 전환 -->
<style>
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c27;--border:#2a2a3a;--accent:#c8ff00;--accent2:#ff6b6b;--accent3:#6bc5ff;--purple:#b06bff;--orange:#ffb06b;--text:#e8e8f0;--muted:#7a7a9a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(200,255,0,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(200,255,0,0.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;}

/* HEADER */
header{padding:28px 48px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.h-title{font-family:'DM Serif Display',serif;font-size:2rem;color:#fff;}
.h-title span{color:var(--accent);font-style:italic;}
.h-sub{font-size:0.8rem;color:var(--muted);margin-top:4px;}
.h-dev{font-family:'Cormorant Garamond',serif;font-size:.85rem;font-weight:300;color:transparent;background:linear-gradient(90deg,#7a7a9a,#c8ff00,#7a7a9a);background-clip:text;-webkit-background-clip:text;letter-spacing:3px;margin-top:5px;font-style:italic;opacity:.9;}
.header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.prod-select-wrap{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;padding:8px 14px;}
.prod-select-label{font-size:0.62rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.prod-select{background:none;border:none;color:var(--accent);font-family:'Noto Sans KR',sans-serif;font-size:0.9rem;font-weight:700;outline:none;cursor:pointer;width:220px;}
.prod-select option{background:var(--surface2);color:var(--text);}
.upload-btn{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 16px;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:0.8rem;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;}
.upload-btn:hover{border-color:var(--accent);color:var(--accent);}
.upload-btn.review-btn:hover{border-color:var(--accent3);color:var(--accent3);}
.upload-btn input{display:none;}

/* NAV */
nav{padding:0 48px;border-bottom:1px solid var(--border);display:flex;gap:2px;overflow-x:auto;}
nav::-webkit-scrollbar{height:0;}
.tab-btn{background:none;border:none;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:0.83rem;font-weight:500;padding:14px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:color .2s;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}

/* CONTENT */
.content{padding:32px 48px;}
.tab-panel{display:none;} .tab-panel.active{display:block;}
@media(max-width:900px){header,nav,.content{padding-left:20px;padding-right:20px;}}

/* LOADING */
.page-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:16px;}
.page-loading .dots{display:flex;gap:6px;}
.page-loading .dots span{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:db 1.2s ease-in-out infinite;}
.page-loading .dots span:nth-child(2){animation-delay:.2s;}.page-loading .dots span:nth-child(3){animation-delay:.4s;}
.loading-text{font-size:.85rem;color:var(--muted);}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-state .e-icon{font-size:3rem;margin-bottom:16px;}
.empty-state .e-title{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:8px;}
.empty-state .e-desc{font-size:0.84rem;line-height:1.6;}

/* TOAST */
.toast{position:fixed;bottom:28px;right:28px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 20px;font-size:0.85rem;z-index:999;opacity:0;transform:translateY(10px);transition:all .3s;max-width:320px;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.success{border-left:3px solid var(--accent);}
.toast.error{border-left:3px solid var(--accent2);}

/* STAT CARDS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:28px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative;overflow:hidden;}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.stat-card.c1::after{background:var(--accent);}.stat-card.c2::after{background:var(--accent2);}.stat-card.c3::after{background:var(--accent3);}.stat-card.c4::after{background:var(--purple);}.stat-card.c5::after{background:var(--orange);}
.s-label{font-size:0.67rem;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px;}
.s-val{font-size:1.7rem;font-weight:900;line-height:1;color:#fff;}
.s-sub{font-size:0.72rem;color:var(--muted);margin-top:4px;}

/* INSIGHT GRID */
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px;}
@media(max-width:800px){.insight-grid{grid-template-columns:1fr;}}
.insight-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;}
.insight-card h3{font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:12px;}
.bar-item{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
.bar-label{font-size:0.8rem;width:110px;flex-shrink:0;}
.bar-track{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width 1.2s ease;}
.bf-g{background:var(--accent);}.bf-r{background:var(--accent2);}.bf-b{background:var(--accent3);}.bf-p{background:var(--purple);}.bf-o{background:var(--orange);}
.bar-pct{font-size:0.72rem;color:var(--muted);width:30px;text-align:right;}

/* PAIN */
.sec-title{font-family:'DM Serif Display',serif;font-size:1.25rem;color:#fff;margin-bottom:14px;}
.sec-title small{font-family:'Noto Sans KR',sans-serif;font-size:0.75rem;font-weight:400;color:var(--muted);margin-left:8px;}
.pain-list{display:flex;flex-direction:column;gap:8px;}
.pain-item{background:var(--surface2);border-left:3px solid var(--accent2);border-radius:7px;padding:10px 13px;font-size:0.83rem;line-height:1.5;}
.pain-who{font-size:0.68rem;color:var(--muted);margin-top:2px;}

/* REVIEW INSIGHTS */
.ri-header{display:flex;align-items:center;gap:14px;margin-bottom:22px;flex-wrap:wrap;}
.ri-prod-badge{background:rgba(200,255,0,0.08);border:1px solid rgba(200,255,0,0.25);border-radius:7px;padding:7px 14px;font-size:0.82rem;color:var(--accent);font-weight:700;}
.ri-meta{font-size:0.78rem;color:var(--muted);}
.ri-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
@media(max-width:800px){.ri-grid{grid-template-columns:1fr;}}
.ri-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:20px;}
.ri-card.full{grid-column:1/-1;}
.ri-card-hd{display:flex;align-items:center;gap:9px;margin-bottom:16px;padding-bottom:11px;border-bottom:1px solid var(--border);}
.ri-icon{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0;}
.ri-card-title{font-size:0.88rem;font-weight:700;color:#fff;}
.ri-card-sub{font-size:0.7rem;color:var(--muted);margin-top:1px;}
.reason-list{display:flex;flex-direction:column;gap:9px;}
.reason-item{display:flex;gap:9px;align-items:flex-start;}
.reason-rank{width:20px;height:20px;border-radius:5px;background:rgba(200,255,0,0.1);border:1px solid rgba(200,255,0,0.25);color:var(--accent);font-size:0.65rem;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.reason-text{font-size:0.83rem;line-height:1.5;}
.reason-text strong{color:#fff;}
.reason-quote{font-size:0.73rem;color:var(--muted);font-style:italic;margin-top:2px;}
.loc-list{display:flex;flex-direction:column;gap:11px;}
.loc-item{display:flex;align-items:center;gap:11px;}
.loc-icon{font-size:1.2rem;width:32px;text-align:center;flex-shrink:0;}
.loc-body{flex:1;}
.loc-name{font-size:0.86rem;font-weight:600;}
.loc-detail{font-size:0.72rem;color:var(--muted);margin-top:1px;}
.loc-bar-track{height:5px;background:var(--surface2);border-radius:3px;margin-top:5px;overflow:hidden;}
.loc-bar-fill{height:100%;border-radius:3px;background:var(--accent3);transition:width 1.2s ease;}
.loc-pct{font-size:0.72rem;color:var(--muted);width:28px;text-align:right;flex-shrink:0;}
.top5-list{display:flex;flex-direction:column;gap:7px;}
.top5-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:7px;background:var(--surface2);}
.top5-item.pos{border-left:3px solid var(--accent);}.top5-item.neg{border-left:3px solid var(--accent2);}
.t5-rank{font-size:0.65rem;font-weight:900;width:17px;flex-shrink:0;margin-top:2px;}
.top5-item.pos .t5-rank{color:var(--accent);}.top5-item.neg .t5-rank{color:var(--accent2);}
.t5-kw{font-size:0.83rem;font-weight:700;margin-bottom:2px;}
.t5-desc{font-size:0.73rem;color:var(--muted);}
.ri-summary{font-size:0.88rem;line-height:1.8;background:var(--surface2);border-radius:9px;padding:15px 17px;border-left:3px solid var(--accent);}

/* PERSONA CARDS */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px;}
.persona-card{background:var(--surface);border:1.5px solid var(--border);border-radius:13px;overflow:hidden;transition:transform .2s,border-color .2s;}
.persona-card:hover{transform:translateY(-3px);border-color:rgba(200,255,0,0.3);}
.pc-header{padding:16px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);}
.pc-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
.pc-name{font-size:0.97rem;font-weight:700;}
.pc-meta{font-size:0.73rem;color:var(--muted);margin-top:2px;}
.pc-body{padding:16px 18px;}
.tag-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:13px;}
.tag{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:3px 9px;font-size:0.72rem;color:var(--muted);}
.tag.tg{border-color:rgba(200,255,0,0.3);color:var(--accent);background:rgba(200,255,0,0.05);}
.tag.tr{border-color:rgba(255,107,107,0.3);color:var(--accent2);background:rgba(255,107,107,0.05);}
.tag.tb{border-color:rgba(107,197,255,0.3);color:var(--accent3);background:rgba(107,197,255,0.05);}
.tag.tp{border-color:rgba(176,107,255,0.3);color:var(--purple);background:rgba(176,107,255,0.05);}
.info2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px;}
.il{font-size:0.65rem;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:2px;}
.iv{font-size:0.8rem;line-height:1.4;}
.pp-box{background:rgba(255,107,107,0.06);border:1px solid rgba(255,107,107,0.14);border-radius:6px;padding:9px 12px;margin-bottom:7px;}
.pp-label{font-size:0.64rem;color:var(--accent2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px;}
.pp-text{font-size:0.8rem;line-height:1.5;}
.goal-box{background:rgba(200,255,0,0.04);border:1px solid rgba(200,255,0,0.13);border-radius:6px;padding:9px 12px;margin-bottom:7px;}
.goal-label{font-size:0.64rem;color:var(--accent);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px;}
.goal-text{font-size:0.8rem;line-height:1.5;}
.identity-box{background:rgba(176,107,255,0.05);border:1px solid rgba(176,107,255,0.15);border-radius:6px;padding:9px 12px;margin-bottom:7px;}
.identity-label{font-size:0.64rem;color:var(--purple);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px;}
.identity-text{font-size:0.8rem;line-height:1.5;}
.expand-btn{background:none;border:none;color:var(--muted);font-size:0.74rem;cursor:pointer;margin-top:10px;font-family:'Noto Sans KR',sans-serif;transition:color .2s;display:flex;align-items:center;gap:4px;}
.expand-btn:hover{color:var(--accent);}
.extra{display:none;margin-top:12px;border-top:1px solid var(--border);padding-top:12px;}
.extra.open{display:block;}
.extra-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}

/* FOCUS GROUP */
.step-label{font-size:0.7rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:9px;}
.step-label span{background:var(--accent);color:#000;font-size:0.62rem;font-weight:900;padding:2px 6px;border-radius:3px;}
.part-area{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:20px;margin-bottom:24px;}
.part-hint{font-size:0.78rem;color:var(--muted);margin-bottom:12px;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.fchip{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:5px 12px;font-size:0.75rem;color:var(--muted);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s;}
.sel-type-btn{background:transparent;border:1px solid var(--border);border-radius:7px;padding:4px 11px;font-size:.72rem;cursor:pointer;color:var(--muted);font-family:'Noto Sans KR',sans-serif;transition:all .2s;white-space:nowrap;}
.sel-type-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(200,255,0,.06);}
.fchip:hover{border-color:var(--accent);color:var(--accent);}
.fchip.active{background:rgba(200,255,0,0.08);border-color:var(--accent);color:var(--accent);}
.part-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:9px;}
.pcard{background:var(--surface2);border:2px solid var(--border);border-radius:9px;padding:11px 13px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:9px;position:relative;user-select:none;}
.pcard:hover{border-color:rgba(200,255,0,0.35);transform:translateY(-2px);}
.pcard.selected{border-color:var(--accent);background:rgba(200,255,0,0.06);}
.pcard.hidden{display:none;}
.p-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.05rem;flex-shrink:0;}
.p-nm{font-size:0.83rem;font-weight:700;}
.p-mt{font-size:0.7rem;color:var(--muted);margin-top:2px;line-height:1.3;}
.chk{position:absolute;top:6px;right:7px;width:15px;height:15px;border-radius:50%;background:var(--accent);color:#000;font-size:0.58rem;font-weight:900;display:none;align-items:center;justify-content:center;}
.pcard.selected .chk{display:flex;}
.sel-summary{display:flex;align-items:center;gap:9px;margin-top:13px;padding-top:13px;border-top:1px solid var(--border);}
.sel-count{font-size:0.83rem;font-weight:700;color:var(--accent);flex:1;}
.mini-btn{background:none;border:1px solid var(--border);border-radius:5px;padding:4px 9px;font-size:0.72rem;color:var(--muted);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s;}
.mini-btn:hover{border-color:var(--accent);color:var(--accent);}
.survey-box{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:24px;margin-bottom:20px;}
.survey-box .desc{color:var(--muted);font-size:0.83rem;line-height:1.6;margin-bottom:16px;}
.preset-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:7px;}
.preset-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.preset-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 11px;font-size:0.75rem;color:var(--muted);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s;}
.preset-btn:hover{border-color:var(--accent3);color:var(--accent3);}
.q-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:0.9rem;resize:vertical;min-height:72px;outline:none;transition:border-color .2s;}
.q-input:focus{border-color:var(--accent);}
.run-btn{margin-top:10px;background:var(--accent);color:#000;border:none;border-radius:7px;padding:10px 24px;font-family:'Noto Sans KR',sans-serif;font-size:0.86rem;font-weight:700;cursor:pointer;transition:opacity .2s;}
.run-btn:hover{opacity:.85;}.run-btn:disabled{opacity:.4;cursor:not-allowed;}
.survey-results{display:flex;flex-direction:column;gap:12px;}
.resp-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;opacity:0;transform:translateY(8px);transition:opacity .5s,transform .5s;}
.resp-card.vis{opacity:1;transform:translateY(0);}
.resp-head{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
.resp-name{font-weight:700;font-size:0.9rem;}
.resp-role{font-size:0.72rem;color:var(--muted);}
.resp-text{font-size:0.85rem;line-height:1.7;}
.focus-bar{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.fb-label{font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;}
.fb-chips{display:flex;gap:6px;flex-wrap:wrap;flex:1;}
.fb-chip{display:flex;align-items:center;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:3px 8px;font-size:0.73rem;}
.dots{display:flex;gap:5px;padding:4px 0;}
.dots span{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:db 1.2s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:.2s;}.dots span:nth-child(3){animation-delay:.4s;}
@keyframes db{0%,80%,100%{transform:scale(.6);opacity:.4;}40%{transform:scale(1);opacity:1;}}

/* COMPARE */
.cmp-selector{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:22px;margin-bottom:24px;}
.cmp-sel-title{font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:14px;}
.cmp-prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:600px){.cmp-prod-grid{grid-template-columns:1fr;}}
.cmp-prod-slot{border:2px dashed var(--border);border-radius:9px;padding:14px;transition:border-color .2s;}
.cmp-prod-slot.filled{border-style:solid;border-color:rgba(200,255,0,0.4);background:rgba(200,255,0,0.03);}
.cmp-slot-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px;}
.cmp-slot-a .cmp-slot-label{color:var(--accent);}
.cmp-slot-b .cmp-slot-label{color:var(--accent3);}
.cmp-select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:8px 11px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:0.86rem;outline:none;cursor:pointer;}
.cmp-run-row{display:flex;justify-content:center;margin-top:16px;}
.cmp-run-btn{background:var(--accent);color:#000;border:none;border-radius:8px;padding:11px 32px;font-family:'Noto Sans KR',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;transition:opacity .2s;}
.cmp-run-btn:hover{opacity:.85;}.cmp-run-btn:disabled{opacity:.4;cursor:not-allowed;}
.cmp-section{margin-bottom:32px;}
.cmp-sec-hd{display:flex;align-items:center;gap:11px;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.cmp-sec-icon{font-size:1.2rem;}
.cmp-sec-title{font-family:'DM Serif Display',serif;font-size:1.15rem;color:#fff;}
.cmp-sec-sub{font-size:0.75rem;color:var(--muted);margin-top:2px;}
.cmp-2col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:700px){.cmp-2col{grid-template-columns:1fr;}}
.cmp-col{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:18px;}

<script>
// ═══════════════════════ GEMINI API ═══════════════════════
// ⚠️ 여기에 Gemini API 키를 입력하세요 (Google AI Studio에서 발급)
// ── AI 호출: Netlify Function 프록시 경유 (API 키는 Netlify 환경변수에서 관리)
async function callAI(prompt, max_tokens = 1000) {
  try {
    const res = await fetch('https://gemini-proxy.boysof20thc.workers.dev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, max_tokens })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      return { error: err.error || `HTTP ${res.status}`, text: '' };
    }
    return await res.json(); // { text: "..." }
  } catch(e) {
    return { error: e.message, text: '' };
  }
}

// ═══════════════════════ 메모리 DB (Supabase 대체) ═══════════════════════
// 모든 데이터를 브라우저 메모리에 보관
const memDB = {
  products: [],       // [{id, name, category, created_at}]
  personas: [],       // [{id, product_id, ...페르소나 필드}]
  review_raw: [],     // [{id, product_id, reviewer_name, rating, review_text, review_date}]
  review_insights: [] // [{id, product_id, purchase_reasons, install_locations, positive_top5, negative_top5, summary, analyzed_at, review_count}]
};
let _autoId = 1;
const nextId = () => _autoId++;

// Supabase 호환 인터페이스 (기존 코드 최소 수정용)
const sb = {
  from: (table) => ({
    select: (cols) => ({
      order: (col, opt) => ({ data: [...memDB[table]], error: null }),
      eq: (col, val) => ({
        order: (c, o) => ({ data: memDB[table].filter(r => r[col] === val), error: null }),
        limit: (n) => ({ data: memDB[table].filter(r => r[col] === val).slice(0, n), error: null }),
        single: () => { const d = memDB[table].find(r => r[col] === val); return { data: d||null, error: d?null:'not found' }; },
        data: memDB[table].filter(r => r[col] === val), error: null
      }),
      limit: (n) => ({ data: memDB[table].slice(0, n), error: null }),
      data: [...memDB[table]], error: null
    }),
    insert: async (rows) => {
      const arr = Array.isArray(rows) ? rows : [rows];
      arr.forEach(r => { r.id = r.id || nextId(); memDB[table].push(r); });
      return { data: arr, error: null };
    },
    upsert: async (row, opts) => {
      const conflictKey = opts?.onConflict;
      if (conflictKey) {
        const idx = memDB[table].findIndex(r => r[conflictKey] === row[conflictKey]);
        if (idx >= 0) { memDB[table][idx] = { ...memDB[table][idx], ...row }; }
        else { row.id = row.id || nextId(); memDB[table].push(row); }
      } else {
        row.id = row.id || nextId(); memDB[table].push(row);
      }
      return { data: row, error: null };
    },
    delete: () => ({
      eq: (col, val) => {
        memDB[table] = memDB[table].filter(r => r[col] !== val);
        return { data: null, error: null };
      }
    }),
    // select().eq() 체인을 async/await로 쓰는 경우 대응
    eq: (col, val) => ({
      select: (c) => ({ data: memDB[table].filter(r => r[col] === val), error: null }),
      limit: (n) => ({ data: memDB[table].filter(r => r[col] === val).slice(0,n), error: null }),
    }),
  }),
};

// ═══════════════════════ STATE ═══════════════════════
let allProducts = [];      // [{id, name, category}]
let currentProductId = null;
let currentPersonas = [];  // 현재 제품 페르소나
let currentInsight = null; // 현재 제품 리뷰 인사이트
let selectedParts = new Set();
let partsRendered = false;
const PERSONA_COLORS = ['#c8ff00','#ffb06b','#6bc5ff','#b06bff','#ff6b6b','#ff9f43','#54a0ff','#5f27cd'];
const PERSONA_EMOJIS = ['🌿','🐾','🏡','👨‍👩‍👧','🐱','💼','👶','👔','🎨','🌸'];

// ═══════════════════════ INIT ═══════════════════════
window.addEventListener('load', () => {
  loadProducts();
});

function loadProducts() {
  allProducts = [...memDB.products];
  const sel = document.getElementById('product-select');
  sel.innerHTML = allProducts.length === 0
    ? '<option value="">— 등록된 제품 없음 —</option>'
    : allProducts.map(p => `<option value="${p.id}">${p.name}</option>`).join('');

  ['cmp-sel-a','cmp-sel-b'].forEach(id => {
    const s = document.getElementById(id);
    if (!s) return;
    s.innerHTML = '<option value="">— 제품 선택 —</option>' +
      allProducts.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
  });

  if (allProducts.length > 0) {
    currentProductId = allProducts[0].id;
    sel.value = currentProductId;
    loadProductData(currentProductId);
  } else {
    showEmptyState();
  }
}

function loadProductData(productId) {
  document.getElementById('tab-overview').innerHTML = `<div class="page-loading"><div class="dots"><span></span><span></span><span></span></div><div class="loading-text">데이터 로딩 중...</div></div>`;

  // 메모리에서 직접 조회
  const personas = memDB.personas.filter(p => p.product_id === productId).sort((a,b) => a.id - b.id);
  const insights = memDB.review_insights.filter(r => r.product_id === productId);

  currentPersonas = personas.map((p, i) => ({
    ...p,
    color: PERSONA_COLORS[i % PERSONA_COLORS.length],
    emoji: PERSONA_EMOJIS[i % PERSONA_EMOJIS.length]
  }));
  currentInsight = insights[0] || null;

  // 탭 리셋
  document.getElementById('cards-grid').innerHTML = '';
  document.getElementById('part-grid').innerHTML = '';
  document.getElementById('focus-results').innerHTML = '';
  document.getElementById('idea-grid').innerHTML = '';
  document.getElementById('product-grid').innerHTML = '';
  partsRendered = false;
  selectedParts.clear();

  renderOverview();
  renderReview();

  const activeTab = document.querySelector('.tab-panel.active')?.id;
  if (activeTab === 'tab-personas') renderPersonas();
  if (activeTab === 'tab-focus') renderParts();
  if (activeTab === 'tab-marketing') renderMarketing();
}

function onProductChange() {
  const sel = document.getElementById('product-select');
  currentProductId = parseInt(sel.value);
  loadProductData(currentProductId);
}

function showEmptyState() {
  document.getElementById('tab-overview').innerHTML = `
    <div class="empty-state">
      <div class="e-icon">📂</div>
      <div class="e-title">아직 등록된 제품이 없어요</div>
      <div class="e-desc">우측 상단 "CSV 업로드" 버튼으로<br>첫 번째 제품 페르소나를 업로드해주세요.</div>
    </div>`;
}

// ═══════════════════════ CSV 업로드 (페르소나) ═══════════════════════
async function handleCSVUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  showToast('CSV 파일 읽는 중...', 'success');

  const text = await file.text();
  const bom = text.charCodeAt(0) === 0xFEFF ? text.slice(1) : text;
  const lines = bom.split('\n').filter(l => l.trim());
  if (lines.length < 2) { showToast('CSV 데이터가 없습니다.', 'error'); return; }

  const headers = parseCSVLine(lines[0]);
  const rows = lines.slice(1).map(l => {
    const vals = parseCSVLine(l);
    const obj = {};
    headers.forEach((h, i) => obj[h.trim()] = (vals[i] || '').trim());
    return obj;
  }).filter(r => Object.values(r).some(v => v));

  if (rows.length === 0) { showToast('유효한 데이터가 없습니다.', 'error'); return; }

  const productName = rows[0]['제품명'] || rows[0]['product_name'] || file.name.replace('.csv','');
  const productCategory = rows[0]['카테고리'] || rows[0]['category'] || '기타';

  showToast(`"${productName}" 저장 중...`, 'success');

  // 메모리에 제품 upsert
  let prod = memDB.products.find(p => p.name === productName);
  if (!prod) {
    prod = { id: nextId(), name: productName, category: productCategory, created_at: new Date().toISOString() };
    memDB.products.push(prod);
  }
  const productId = prod.id;

  // 기존 페르소나 삭제 후 재삽입
  memDB.personas = memDB.personas.filter(p => p.product_id !== productId);

  const personaRows = rows.map(r => {
    // ── D1 생애주기 → children (있음/없음 정규화)
    const lifecycle = r['D1_생애주기'] || r['자녀_유무'] || '';
    const childrenVal = (lifecycle && !['미상','판별불가','해당없음','없음','미혼'].some(x => lifecycle.includes(x)))
      ? '있음' : lifecycle.includes('없음') ? '없음' : lifecycle || r['children'] || '';

    // ── D9 연령대추정 → age_group 정규화 (첫 번째 값 사용)
    const ageRaw = r['D9_연령대추정'] || r['연령대_그룹'] || r['age_group'] || '';
    const ageFirst = ageRaw.split(',')[0].trim();
    const ageGroupNorm = {
      '2030영유아부모신혼':'30대', '4050학부모기성세대':'40대이상',
      '2030신혼':'30대', '2030':'30대', '4050':'40대이상',
      '20대':'20대', '30대초반':'30대초반', '30대중반':'30대중반',

      // 인구통계 (D1~D2 우선, v8 컬럼 fallback)
      gender:          r['성별'] || '',

      age:             ageRaw,

      pet_detail:      petRaw,

      income:          incomeVal,

      consume_value:   r['D5_소비가치관'] || '',

      // 직업/채널 (D6 우선)

      info_channel:    r['주_정보_채널'] || r['info_channel'] || '',
      device:          r['주_사용_기기'] || r['device'] || '',
      it_level:        r['IT_숙련도'] || r['it_level'] || '',
      // 리뷰 행동 (D7 우선)
      review_tone:     r['리뷰_성향'] || r['review_tone'] || '',
      purchase_loyalty: loyaltyVal,
      review_style:    r['D7_리뷰스타일'] || r['리뷰_작성_스타일'] || r['review_style'] || '',
      age_confidence:  r['D9_신뢰도'] || '',
      // 태그형
      pain_points:     r['Pain_Tags'] || r['Pain_Points'] || r['pain_points'] || '',
      unmet_needs:     r['Unmet_Tags'] || r['Unmet_Needs'] || r['unmet_needs'] || '',
      shopping_factor: r['쇼핑_결정_요인'] || r['shopping_factor'] || '',
      // 자유텍스트
      core_values:     r['핵심_가치관'] || r['core_values'] || '',
      lifestyle:       r['라이프스타일'] || r['lifestyle'] || '',
      goals:           r['최종_목표'] || r['goals'] || '',
      identity:        r['나는누구인가'] || r['identity'] || '',
      aesthetic:       r['추구미'] || r['aesthetic'] || '',
      review_text:     r['전체_리뷰_통합'] || r['review_text'] || '',
    };
  });

  // 메모리에 페르소나 저장
  personaRows.forEach(r => { r.id = nextId(); memDB.personas.push(r); });

  showToast(`✅ "${productName}" ${rows.length}명 업로드 완료!`, 'success');

  // 헤더 상태 업데이트
  const ps = document.getElementById('persona-upload-status');
  if (ps) { ps.textContent = `✅ ${productName} · ${rows.length}명`; ps.style.color = 'var(--accent)'; }

  // 제품 목록 새로고침 후 해당 제품으로 전환
  loadProducts();
  document.getElementById('product-select').value = productId;
  currentProductId = productId;
  loadProductData(productId);

  event.target.value = '';
}

function parseCSVLine(line) {
  const result = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQ = !inQ; }
    else if (ch === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
    else { cur += ch; }
  }
  result.push(cur.trim());
  return result;
}

function switchTab(id, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');

  if (id === 'focus') renderParts();
  if (id === 'marketing') { document.getElementById('idea-grid').innerHTML = ''; renderMarketing(); }
  if (id === 'product')   { document.getElementById('product-grid').innerHTML = ''; renderProduct(); }

}

function animateBars(container) {

    setTimeout(() => { el.style.width = w; }, 150);
  });

function topN(map, n) { return Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,n); }
function countMap(ps, fn) {
  const m = {};
  ps.forEach(p => { const k = fn(p); if(k) m[k]=(m[k]||0)+1; });
  return m;
}
function barRows(entries, total, colors) {
  const cls = ['bf-g','bf-b','bf-r','bf-p','bf-o'];
  return entries.map(([k,v],i)=>`
    <div class="bar-item">
      <span class="bar-label" title="${k}">${k.length>13?k.substring(0,13)+'…':k}</span>
      <div class="bar-track"><div class="bar-fill ${cls[i%cls.length]}" style="width:0" data-w="${Math.round(v/total*100)}%"></div></div>
      <span class="bar-pct">${Math.round(v/total*100)}%</span>
      <span class="bar-n" style="font-size:.65rem;color:var(--muted);margin-left:3px">(${v}명)</span>
    </div>`).join('');
}

// 헤더 버튼용 - 업로드 후 리뷰 인사이트 탭으로 자동 이동

// 리뷰 CSV 업로드 처리 (헤더 & 탭 내부 공용)
let reviewRawData = [];
async function handleReviewCSV(event, fromHeader = false) {
  const file = event.target.files[0];
  if (!file) return;

  // 현재 제품 체크
  if (!currentProductId) {
    showToast('⚠️ 먼저 페르소나 CSV를 업로드해 제품을 등록해주세요.', 'error');
    return;
  }

  const statusEl = document.getElementById('rv-csv-status');
  const previewEl = document.getElementById('rv-csv-preview');
  if (statusEl) statusEl.textContent = '파일 읽는 중...';
  showToast('리뷰 CSV 읽는 중...', 'success');

  const text = await file.text();
  const bom = text.charCodeAt(0) === 0xFEFF ? text.slice(1) : text;
  const lines = bom.trim().split('\n').filter(l => l.trim());
  if (lines.length < 2) { showToast('리뷰 데이터가 없습니다.', 'error'); return; }

  const headers = parseCSVLine(lines[0]).map(h => h.trim());
  const rows = lines.slice(1).map(l => {
    const vals = parseCSVLine(l);
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i]||'').trim());
    return obj;
  }).filter(r => Object.values(r).some(v => v));

  reviewRawData = rows;

  // 탭 내부 상태 업데이트
  if (statusEl) statusEl.innerHTML = `<span style="color:var(--accent3);font-weight:700">${rows.length}개 리뷰 로드됨</span>`;
  if (previewEl) {
    const colBadges = headers.map(h => `<span style="background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:2px 8px;font-size:.7rem;color:var(--muted)">${h}</span>`).join(' ');
    previewEl.innerHTML = `<div style="font-size:.72rem;color:var(--muted);margin-bottom:6px">감지된 컬럼:</div><div style="display:flex;flex-wrap:wrap;gap:4px">${colBadges}</div>`;
  }

  // 헤더 상태 업데이트
  const rs = document.getElementById('review-upload-status');
  if (rs) { rs.textContent = `✅ ${file.name.replace('.csv','')} · ${rows.length}건`; rs.style.color = 'var(--accent3)'; }

  // 메모리에 저장
  const prod = allProducts.find(p => p.id === currentProductId);
  if (!prod) return;
  memDB.review_raw = memDB.review_raw.filter(r => r.product_id !== currentProductId);
  const insertRows = rows.map(r => ({
    id: nextId(),
    product_id:    currentProductId,
    product_name:  prod.name,
    reviewer_name: r['리뷰어명'] || r['reviewer_name'] || r['프로필_이름'] || r['사용자ID'] || '',
    rating:        parseFloat(r['평점'] || r['rating'] || r['별점'] || 0) || null,
    review_text:   r['리뷰텍스트'] || r['review_text'] || r['전체_리뷰_통합'] || r['리뷰내용'] || '',
    review_date:   r['리뷰날짜'] || r['review_date'] || r['날짜'] || '',
  })).filter(r => r.review_text);
  memDB.review_raw.push(...insertRows);

  showToast(`✅ 리뷰 ${insertRows.length}건 로드 완료 — AI 분석 시작하기를 눌러주세요.`, 'success');
  event.target.value = '';
}

async function runReviewAnalysis() {
  const btn     = document.getElementById('ai-analyze-btn');
  const stopBtn = document.getElementById('ai-stop-btn');
  const log     = document.getElementById('analyze-log');
  const prod    = allProducts.find(p => p.id === currentProductId);
  const prodName = prod?.name || '';

  if (!prodName) { showToast('제품명을 확인할 수 없습니다.', 'error'); return; }

  analysisAborted = false;
  btn.disabled = true; btn.textContent = '🔄 분석 중...';
  if (stopBtn) stopBtn.style.display = 'inline-block';

  const addLog = (msg) => {
    if (!log) return;
    log.innerHTML += `<div style="font-size:.76rem;color:var(--muted);padding:5px 0;border-bottom:1px solid var(--border)">${msg}</div>`;
    log.scrollTop = log.scrollHeight;
  };

  // 1) API 연결 테스트
  addLog('🔌 Gemini API 연결 테스트 중...');
  try {
    const testData = await callAI('안녕. 한 단어로만 답해.', 10);
    if (testData.error) { addLog(`❌ API 연결 실패: ${testData.error}`); btn.disabled=false; btn.textContent='🔍 AI 분석 시작하기'; if(stopBtn) stopBtn.style.display='none'; return; }
    addLog('✅ API 연결 성공');
  } catch(e) { addLog(`❌ 네트워크 오류: ${e.message}`); btn.disabled=false; btn.textContent='🔍 AI 분석 시작하기'; if(stopBtn) stopBtn.style.display='none'; return; }

  if (analysisAborted) { addLog('⏹ 분석이 중지되었습니다.'); btn.disabled=false; btn.textContent='🔍 AI 분석 시작하기'; if(stopBtn) stopBtn.style.display='none'; return; }

  // 2) 리뷰 데이터 소스 결정 (메모리에서 조회)
  let reviewSamples = [];
  const rawRows = memDB.review_raw.filter(r => r.product_id === currentProductId).slice(0, 200);

  if (rawRows && rawRows.length > 0) {
    addLog(`📋 리뷰 전용 CSV 데이터 ${rawRows.length}개 사용`);
    reviewSamples = rawRows.map(r => `[${r.reviewer_name||'?'}★${r.rating||'-'}] ${r.review_text||''}`);
  } else {
    addLog(`📋 페르소나 리뷰 텍스트에서 키워드 필터링 중...`);
    const keywords = prodName.split(/\s+/).filter(k => k.length > 1);
    currentPersonas.forEach(p => {
      const text = p.review_text || '';
      const sents = text.split(/[/[\]]+/).filter(s => s.trim().length > 15);
      const rel = sents.filter(s => keywords.some(kw => s.includes(kw)));
      if (rel.length > 0) reviewSamples.push(`[${p.profile_name||'?'}] ${rel.join(' ').substring(0,600)}`);
    });
    addLog(`✅ ${reviewSamples.length}명의 리뷰에서 제품 관련 내용 발견`);
  }

  if (reviewSamples.length === 0) { addLog('⚠️ 분석할 리뷰가 없습니다.'); btn.disabled=false; btn.textContent='🔍 AI 분석 시작하기'; if(stopBtn) stopBtn.style.display='none'; return; }

  // 3) 배치 처리 (30개 단위)
  const BATCH = 30;
  const batches = [];
  for (let i = 0; i < reviewSamples.length; i += BATCH) batches.push(reviewSamples.slice(i, i+BATCH));
  addLog(`🤖 Gemini AI가 총 ${reviewSamples.length}개 리뷰를 ${batches.length}개 배치로 분석 중...`);

  let allPurchase=[], allLocations=[], allPositive=[], allNegative=[], allSummaries=[];

  for (let bi = 0; bi < batches.length; bi++) {
    if (analysisAborted) { addLog('⏹ 사용자가 분석을 중지했습니다.'); break; }
    addLog(`  📦 배치 ${bi+1}/${batches.length} (${batches[bi].length}개) 분석 중...`);

    const batchPrompt = `"${prodName}" 제품 리뷰 ${batches[bi].length}건 분석. 아래 JSON만 출력:

리뷰:
${batches[bi].join('\n---\n')}

{"purchase_reasons":[{"rank":1,"reason":"키워드","detail":"설명","quote":"인용","mention_count":0},{"rank":2,"reason":"키워드","detail":"설명","quote":"인용","mention_count":0},{"rank":3,"reason":"키워드","detail":"설명","quote":"인용","mention_count":0}],"install_locations":[{"location":"장소","icon":"🏠","detail":"설명","pct":0}],"positive_top5":[{"rank":1,"keyword":"키워드","desc":"설명","mention_count":0},{"rank":2,"keyword":"키워드","desc":"설명","mention_count":0},{"rank":3,"keyword":"키워드","desc":"설명","mention_count":0},{"rank":4,"keyword":"키워드","desc":"설명","mention_count":0},{"rank":5,"keyword":"키워드","desc":"설명","mention_count":0}],"negative_top5":[{"rank":1,"keyword":"키워드","desc":"설명","mention_count":0},{"rank":2,"keyword":"키워드","desc":"설명","mention_count":0},{"rank":3,"keyword":"키워드","desc":"설명","mention_count":0},{"rank":4,"keyword":"키워드","desc":"설명","mention_count":0},{"rank":5,"keyword":"키워드","desc":"설명","mention_count":0}],"summary":"2문장요약"}`;

    try {
      const bData = await callAI(batchPrompt, 3000);
      if (bData.error) { addLog(`  ⚠️ 배치 ${bi+1} 오류: ${bData.error}`); continue; }
      const bRaw = (bData.text||'').replace(/```json|```/g,'').trim();
      const bMatch = bRaw.match(/\{[\s\S]*\}/);
      if (!bMatch) { addLog(`  ⚠️ 배치 ${bi+1} JSON 파싱 실패`); continue; }
      const bR = JSON.parse(bMatch[0]);
      if (bR.purchase_reasons) allPurchase.push(...bR.purchase_reasons);
      if (bR.install_locations) allLocations.push(...bR.install_locations);
      if (bR.positive_top5) allPositive.push(...bR.positive_top5);
      if (bR.negative_top5) allNegative.push(...bR.negative_top5);
      if (bR.summary) allSummaries.push(bR.summary);
      addLog(`  ✅ 배치 ${bi+1} 완료`);
    } catch(e) { addLog(`  ⚠️ 배치 ${bi+1} 오류: ${e.message}`); }
  }

  if (analysisAborted) {
    btn.disabled=false; btn.textContent='🔍 AI 분석 시작하기'; if(stopBtn) stopBtn.style.display='none';
    return;
  }

  // 4) 결과 통합
  addLog('🔗 결과 통합 중...');
  function mergeByKey(arr, keyField) {
    const map = {};
    arr.forEach(item => { const k=(item[keyField]||'').substring(0,12); if(!k) return; if(!map[k]) map[k]={...item,mention_count:0}; map[k].mention_count+=(item.mention_count||1); });
    return Object.values(map).sort((a,b)=>b.mention_count-a.mention_count);
  }
  function mergeLocations(arr) {
    const map = {};
    arr.forEach(item => { const k=(item.location||'').substring(0,10); if(!k) return; if(!map[k]) map[k]={...item,_cnt:0}; map[k]._cnt++; });
    const t = Object.values(map).reduce((s,v)=>s+v._cnt,0)||1;
    return Object.values(map).map(v=>({...v,pct:Math.round(v._cnt/t*100)})).sort((a,b)=>b.pct-a.pct).slice(0,4);
  }

  const result = {
    purchase_reasons: mergeByKey(allPurchase,'reason').slice(0,3).map((r,i)=>({...r,rank:i+1})),
    install_locations: mergeLocations(allLocations),
    positive_top5: mergeByKey(allPositive,'keyword').slice(0,5).map((r,i)=>({...r,rank:i+1})),
    negative_top5: mergeByKey(allNegative,'keyword').slice(0,5).map((r,i)=>({...r,rank:i+1})),
    summary: allSummaries.join(' ')
  };

  if (!result.purchase_reasons.length) { addLog('❌ 분석 결과가 비어있습니다.'); btn.disabled=false; btn.textContent='🔍 AI 분석 시작하기'; if(stopBtn) stopBtn.style.display='none'; return; }

  // 5) 메모리 저장
  addLog('💾 분석 결과 저장 중...');
  const saveData = {
    id: nextId(),
    product_id:       currentProductId,
    product_name:     prodName,
    purchase_reasons: JSON.stringify(result.purchase_reasons),
    install_locations: JSON.stringify(result.install_locations),
    positive_top5:    JSON.stringify(result.positive_top5),
    negative_top5:    JSON.stringify(result.negative_top5),
    summary:          result.summary,
    analyzed_at:      new Date().toISOString(),
    review_count:     reviewSamples.length,
    is_cached:        true
  };
  memDB.review_insights = memDB.review_insights.filter(r => r.product_id !== currentProductId);
  memDB.review_insights.push(saveData);

  addLog('✅ 저장 완료! 마케팅/상품기획/제품비교 탭에 리뷰 인사이트가 반영됩니다.');
  showToast('✅ 리뷰 인사이트 분석 완료!', 'success');
  currentInsight = saveData;

  // 리뷰 인사이트 의존 탭 캐시 리셋
  document.getElementById('idea-grid').innerHTML = '';
  document.getElementById('product-grid').innerHTML = '';

  if(stopBtn) stopBtn.style.display='none';
  setTimeout(() => renderReviewData(currentInsight, prod), 500);
}

  const prompt = `두 제품 구매 고객 D1~D9 데이터 비교, JSON만 응답.

${summarize(pA, 'A:'+prodA?.name)}
${summarize(pB, 'B:'+prodB?.name)}

{"common":["공통특성1(수치포함)","공통특성2","공통특성3"],"only_a":["A만의특성1(D항목언급)","A만의특성2","A만의특성3"],"only_b":["B만의특성1(D항목언급)","B만의특성2","B만의특성3"],"strategy_a":"A전략(차이점기반3문장)","strategy_b":"B전략(차이점기반3문장)","differentiation":"핵심차별화포인트(3문장)"}`;

  let ai = null;
  try {
    const data = await callAI(prompt, 1000);
    ai = JSON.parse((data.text||'{}').replace(/```json|```/g,'').trim());
  } catch(e) { ai = null; }

  renderCompareResult(prodA, prodB, pA, pB, insA[0]||null, insB[0]||null, ai);
  btn.disabled = false; btn.textContent = '⚖️ 비교 분석 시작';
}

function renderCompareResult(prodA, prodB, pA, pB, insA, insB, ai) {
  const out = document.getElementById('cmp-results');
  const d = ai || {common:['데이터 분석 중'],only_a:['분석 중'],only_b:['분석 중'],strategy_a:'분석 중',strategy_b:'분석 중',differentiation:'분석 중',diff_details:[]};

  // ── D1~D9 전체 항목 집계 헬퍼
  const calcStats = (ps) => {
    const total = ps.length; if(!total) return null;
    const pct = n => Math.round(n/total*100);
    const cntMap = (fn) => { const m={}; ps.forEach(p=>{const k=fn(p);if(k)m[k]=(m[k]||0)+1;}); return m; };
    const topN = (m,n) => Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,n);
    const tagMap = (field, excl=[]) => { const m={}; ps.forEach(p=>(p[field]||'').split(/[,，]+/).forEach(t=>{const k=t.trim();if(k&&!excl.includes(k))m[k]=(m[k]||0)+1;})); return m; };

    // D1
    const married    = ps.filter(p=>(p.married||'').includes('기혼')).length;
    const mUnknown   = ps.filter(p=>{const m=(p.married||'').trim();return !m||m==='미상'||m==='판별불가';}).length;
    const mSingle    = total-married-mUnknown;
    const childYes   = ps.filter(p=>(p.children||'').includes('있음')).length;
    const childNone  = ps.filter(p=>(p.children||'').includes('없음')).length;
    const childUnk   = total-childYes-childNone;
    // D1 생애주기 상세
    const lcMap={}; ps.forEach(p=>(p.children_detail||'').split(/[,，]+/).forEach(t=>{const k=t.trim();if(k&&!['미상','판별불가','해당없음','있음','없음'].includes(k))lcMap[k]=(lcMap[k]||0)+1;}));
    const lcTop = topN(lcMap,3);
    // D2
    const petYes = ps.filter(p=>(p.pet||'').includes('있음')).length;
    const petMap={}; ps.forEach(p=>(p.pet_detail||'').split(/[,，]+/).forEach(t=>{const k=t.trim();if(k&&k!=='없음'&&k!=='미상')petMap[k]=(petMap[k]||0)+1;}));
    // D3
    const healthMap  = tagMap('health_diet', ['해당없음','']);
    // D4
    const housingMap = {}; ps.forEach(p=>{const h=(p.housing||'').split('/')[0].trim().substring(0,10);if(h&&!h.includes('판별불가'))housingMap[h]=(housingMap[h]||0)+1;});
    // D5
    const consumeMap = tagMap('consume_value');
    // D6
    const jobMap     = cntMap(p=>(p.job||'').trim());
    // D7
    const styleMap   = cntMap(p=>(p.review_style||'').trim());
    // D8
    const payMap     = tagMap('payment_type', ['판별불가']);
    // D9
    const ageMap     = cntMap(p=>(p.age_group||'').trim());
    // Pain / Unmet
    const painMap    = tagMap('pain_points');
    const unmetMap   = tagMap('unmet_needs');
    const shopMap    = tagMap('shopping_factor');
    // 평균
    const avgRating  = (ps.reduce((s,p)=>s+(parseFloat(p.avg_rating)||0),0)/total).toFixed(1);
    const avgReviews = Math.round(ps.reduce((s,p)=>s+(parseInt(p.total_reviews)||0),0)/total);

    return {total,pct,topN,married,mUnknown,mSingle,childYes,childNone,childUnk,lcTop,
      petYes,petMap,healthMap,housingMap,consumeMap,jobMap,styleMap,payMap,ageMap,
      painMap,unmetMap,shopMap,avgRating,avgReviews};
  };

  const sA = calcStats(pA), sB = calcStats(pB);

  // ── 비교 바 렌더 (두 수치 나란히)
  // cmpBar: nA, nB = 실제 명수 (선택), totalA, totalB = 각 제품 총수
  const cmpBar = (label, vA, vB, colorA='var(--accent)', colorB='var(--accent3)', nA=null, nB=null) => {
    const diff = Math.abs(vA-vB);
    const insightColor = diff>=15 ? (vA>vB?'#22c55e':'#6bc5ff') : diff>=10 ? '#fbbf24' : 'var(--muted)';
    return `
    <div style="margin-bottom:11px">
      <div style="font-size:.73rem;color:#fff;margin-bottom:5px">${label}</div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
        <span style="font-size:.65rem;color:var(--accent);width:14px;text-align:right">A</span>
        <div style="flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden">
          <div class="bar-fill-anim" style="height:100%;width:${vA}%;background:${colorA};border-radius:3px"></div>
        </div>
        <span style="font-size:.72rem;font-weight:700;color:${colorA};min-width:32px">${vA}%${nA!==null?` <span style="font-size:.62rem;font-weight:400;color:var(--muted)">(${nA}명)</span>`:''}</span>
        <span style="font-size:.65rem;font-weight:700;color:${insightColor};min-width:2.5rem">
          ${diff>=10?(vA>vB?'▲':'▼')+diff+'%p':'≈'}
        </span>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:.65rem;color:var(--accent3);width:14px;text-align:right">B</span>
        <div style="flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden">
          <div class="bar-fill-anim" style="height:100%;width:${vB}%;background:${colorB};border-radius:3px"></div>
        </div>
        <span style="font-size:.72rem;font-weight:700;color:${colorB};min-width:32px">${vB}%${nB!==null?` <span style="font-size:.62rem;font-weight:400;color:var(--muted)">(${nB}명)</span>`:''}</span>
      </div>
    </div>`;
  };

  // ── 단일 섹션 바 (한 제품용)
  const miniBar = (label, v, color, cls='bf-g') => `
    <div class="bar-item">
      <span class="bar-label" style="width:80px;font-size:.72rem">${label}</span>
      <div class="bar-track"><div class="bar-fill ${cls}" style="width:0" data-w="${v}%"></div></div>
      <span class="bar-pct">${v}%</span>
    </div>`;

  // ── 태그 리스트 (상위 N개)
  // tagList: 명수 + % 동시 표시, total은 해당 제품 total
  const tagList = (map, topN_, color, total_=0) => topN_(map,5).map(([k,v])=>`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span style="font-size:.77rem">${k}</span>
      <div style="display:flex;align-items:center;gap:4px;flex-shrink:0">
        ${total_?`<span style="font-size:.66rem;color:var(--muted)">${Math.round(v/total_*100)}%</span>`:''}
        <span style="font-size:.68rem;background:${color}18;border:1px solid ${color}30;border-radius:6px;padding:1px 7px;color:${color};font-weight:700">${v}명</span>
      </div>
    </div>`).join('');

  // ── 차이 강조 뱃지
  const diffBadge = (vA, vB, thr=15) => {
    const diff = vA - vB;
    if (Math.abs(diff) < thr) return `<span style="font-size:.62rem;color:var(--muted)">≈ 유사</span>`;
    return diff > 0
      ? `<span style="font-size:.62rem;background:rgba(200,255,0,.12);border:1px solid rgba(200,255,0,.25);border-radius:4px;padding:1px 6px;color:var(--accent)">A +${diff}%p ↑</span>`
      : `<span style="font-size:.62rem;background:rgba(107,197,255,.12);border:1px solid rgba(107,197,255,.25);border-radius:4px;padding:1px 6px;color:var(--accent3)">B +${Math.abs(diff)}%p ↑</span>`;
  };

  // ── 비교 섹션 헤더 헬퍼
  const secHdr = (icon, title, sub, color='var(--muted)') => `
    <div style="display:flex;align-items:center;gap:10px;margin:22px 0 14px;padding:9px 14px;background:${color}08;border:1px solid ${color}20;border-radius:9px">
      <span style="font-size:1.1rem">${icon}</span>
      <div>
        <div style="font-size:.8rem;font-weight:700;color:${color}">${title}</div>
        <div style="font-size:.67rem;color:var(--muted)">${sub}</div>
      </div>
    </div>`;

  const top5Html = (items, type) => (items||[]).slice(0,3).map(x=>`<div class="top5-item ${type}" style="margin-bottom:5px"><div class="t5-rank">T${x.rank}</div><div><div class="t5-kw">${x.keyword}</div><div class="t5-desc">${x.desc}</div></div></div>`).join('');
  let posA=[],negA=[],posB=[],negB=[];
  try{posA=JSON.parse(insA?.positive_top5||'[]');}catch(e){}
  try{negA=JSON.parse(insA?.negative_top5||'[]');}catch(e){}
  try{posB=JSON.parse(insB?.positive_top5||'[]');}catch(e){}
  try{negB=JSON.parse(insB?.negative_top5||'[]');}catch(e){}

  if (!sA || !sB) { out.innerHTML='<div style="color:var(--muted);padding:40px;text-align:center">페르소나 데이터가 없습니다</div>'; return; }

  out.innerHTML = `

  <!-- ① 요약 KPI 카드 -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:6px">
    ${[
      {lbl:'페르소나 수',vA:sA.total+'명',vB:sB.total+'명'},
      {lbl:'평균 평점',vA:sA.avgRating+'점',vB:sB.avgRating+'점'},
      {lbl:'자녀 보유',vA:sA.pct(sA.childYes)+'%',vB:sB.pct(sB.childYes)+'%'},
      {lbl:'반려동물',vA:sA.pct(sA.petYes)+'%',vB:sB.pct(sB.petYes)+'%'},
    ].map(s=>`
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 16px">
        <div style="font-size:.62rem;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">${s.lbl}</div>
        <div style="display:flex;gap:10px">
          <div style="flex:1;text-align:center;background:rgba(200,255,0,.06);border-radius:6px;padding:6px 0">
            <div style="font-size:.58rem;color:var(--accent);margin-bottom:2px">A</div>
            <div style="font-size:1.05rem;font-weight:900;color:var(--accent)">${s.vA}</div>
          </div>
          <div style="flex:1;text-align:center;background:rgba(107,197,255,.06);border-radius:6px;padding:6px 0">
            <div style="font-size:.58rem;color:var(--accent3);margin-bottom:2px">B</div>
            <div style="font-size:1.05rem;font-weight:900;color:var(--accent3)">${s.vB}</div>
          </div>
        </div>
      </div>`).join('')}
  </div>

  <!-- ② D1~D9 상세 비교 -->
  ${secHdr('📊','D1~D9 항목별 상세 비교','개요 탭과 동일한 분석 항목 나란히 비교','#22c55e')}

  <!-- D1 생애주기 + 결혼여부 -->
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px">
    <div style="background:var(--surface);border:1px solid var(--border);border-top:2px solid #22c55e;border-radius:12px;padding:16px">
      <div style="font-size:.62rem;font-weight:700;color:#22c55e;margin-bottom:3px;text-transform:uppercase">D1 · 생애주기</div>
      <div style="font-size:.65rem;color:var(--muted);margin-bottom:12px">자녀 보유 현황</div>
      ${cmpBar('자녀 있음', sA.pct(sA.childYes), sB.pct(sB.childYes), 'var(--accent)','var(--accent3)', sA.childYes, sB.childYes)}
      ${cmpBar('기혼', sA.pct(sA.married), sB.pct(sB.married), 'var(--purple)','var(--purple)', sA.married, sB.married)}
      <div style="margin-top:10px;font-size:.64rem;color:var(--muted)">생애주기 유형 A</div>
      ${sA.lcTop.slice(0,3).map(([k,v])=>`<div style="display:flex;justify-content:space-between;font-size:.73rem;margin-top:4px"><span>${k}</span><span style="color:var(--accent)">${sA.pct(v)}% (${v}명)</span></div>`).join('')}
      <div style="margin-top:8px;font-size:.64rem;color:var(--muted)">생애주기 유형 B</div>
      ${sB.lcTop.slice(0,3).map(([k,v])=>`<div style="display:flex;justify-content:space-between;font-size:.73rem;margin-top:4px"><span>${k}</span><span style="color:var(--accent3)">${sB.pct(v)}% (${v}명)</span></div>`).join('')}
      ${(()=>{const d=sA.pct(sA.childYes)-sB.pct(sB.childYes);return Math.abs(d)>=10?`<div style="margin-top:10px;padding:7px 10px;background:rgba(255,191,36,.06);border:1px solid rgba(255,191,36,.2);border-radius:7px;font-size:.69rem;color:#fbbf24;line-height:1.5">💡 자녀 보유 비중 ${d>0?'A':'B'}가 ${Math.abs(d)}%p 높음 — ${d>0?'A 제품 구매자가 육아 가구 중심, 패밀리 마케팅 유효':'B 제품 구매자가 육아 가구 중심, 패밀리 마케팅 유효'}</div>`:''})()}
    </div>

    <div style="background:var(--surface);border:1px solid var(--border);border-top:2px solid #22c55e;border-radius:12px;padding:16px">
      <div style="font-size:.62rem;font-weight:700;color:#22c55e;margin-bottom:3px;text-transform:uppercase">D2 · 반려동물</div>
      <div style="font-size:.65rem;color:var(--muted);margin-bottom:12px">보유 현황 비교</div>
      ${cmpBar('반려동물 있음', sA.pct(sA.petYes), sB.pct(sB.petYes), 'var(--accent)','var(--accent3)', sA.petYes, sB.petYes)}
      <div style="margin-top:10px;font-size:.64rem;color:var(--muted)">종류 분포 A</div>
      ${sA.topN(sA.petMap,3).slice(0,3).map(([k,v])=>`<div style="display:flex;justify-content:space-between;font-size:.73rem;margin-top:4px"><span>${k}</span><span style="color:var(--accent)">${sA.pct(v)}% (${v}명)</span></div>`).join('')||'<div style="font-size:.73rem;color:var(--muted)">없음</div>'}
      <div style="margin-top:8px;font-size:.64rem;color:var(--muted)">종류 분포 B</div>
      ${sB.topN(sB.petMap,3).slice(0,3).map(([k,v])=>`<div style="display:flex;justify-content:space-between;font-size:.73rem;margin-top:4px"><span>${k}</span><span style="color:var(--accent3)">${sB.pct(v)}% (${v}명)</span></div>`).join('')||'<div style="font-size:.73rem;color:var(--muted)">없음</div>'}
      ${(()=>{const d=sA.pct(sA.petYes)-sB.pct(sB.petYes);return Math.abs(d)>=10?`<div style="margin-top:10px;padding:7px 10px;background:rgba(255,191,36,.06);border:1px solid rgba(255,191,36,.2);border-radius:7px;font-size:.69rem;color:#fbbf24;line-height:1.5">💡 반려동물 보유 비중 ${d>0?'A':'B'}가 ${Math.abs(d)}%p 높음 — 펫 케어 관련 번들/크로스셀 기회 상이</div>`:''})()}
    </div>

    <div style="background:var(--surface);border:1px solid var(--border);border-top:2px solid #22c55e;border-radius:12px;padding:16px">
      <div style="font-size:.62rem;font-weight:700;color:#22c55e;margin-bottom:3px;text-transform:uppercase">D3 · 건강식이</div>
      <div style="font-size:.65rem;color:var(--muted);margin-bottom:12px">건강·식이 패턴</div>
      <div style="font-size:.64rem;color:var(--accent);margin-bottom:5px">제품 A</div>
      ${tagList(sA.healthMap, sA.topN, 'var(--accent)', sA.total)||'<div style="font-size:.73rem;color:var(--muted)">데이터 없음</div>'}
      <div style="margin-top:10px;font-size:.64rem;color:var(--accent3);margin-bottom:5px">제품 B</div>
      ${tagList(sB.healthMap, sB.topN, 'var(--accent3)', sB.total)||'<div style="font-size:.73rem;color:var(--muted)">데이터 없음</div>'}
      ${(()=>{const tA=sA.topN(sA.healthMap,1)[0],tB=sB.topN(sB.healthMap,1)[0];if(!tA||!tB)return '';const kA=tA[0],kB=tB[0];return kA!==kB?`<div style="margin-top:10px;padding:7px 10px;background:rgba(255,191,36,.06);border:1px solid rgba(255,191,36,.2);border-radius:7px;font-size:.69rem;color:#fbbf24;line-height:1.5">💡 1위 건강 관심사 상이 — A: <b>${kA}</b> vs B: <b>${kB}</b> — 콘텐츠 소구 방향 분리 필요</div>`:''})()}
    </div>
  </div>

  <!-- D5/D6/D7/D8 비교 -->
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-bottom:12px">
    <div style="background:var(--surface);border:1px solid var(--border);border-top:2px solid #fbbf24;border-radius:12px;padding:16px">
      <div style="font-size:.62rem;font-weight:700;color:#fbbf24;margin-bottom:3px;text-transform:uppercase">D5 · 소비가치관</div>
      <div style="font-size:.65rem;color:var(--muted);margin-bottom:10px">구매 가치 우선순위</div>
      <div style="font-size:.63rem;color:var(--accent);margin-bottom:4px">A</div>
      ${tagList(sA.consumeMap, sA.topN, 'var(--accent)', sA.total)||'<div style="font-size:.73rem;color:var(--muted)">없음</div>'}
      <div style="margin-top:9px;font-size:.63rem;color:var(--accent3);margin-bottom:4px">B</div>
      ${tagList(sB.consumeMap, sB.topN, 'var(--accent3)', sB.total)||'<div style="font-size:.73rem;color:var(--muted)">없음</div>'}
      ${(()=>{const tA=sA.topN(sA.consumeMap,1)[0],tB=sB.topN(sB.consumeMap,1)[0];if(!tA||!tB)return '';return tA[0]!==tB[0]?`<div style="margin-top:9px;padding:6px 9px;background:rgba(255,191,36,.06);border:1px solid rgba(255,191,36,.2);border-radius:6px;font-size:.68rem;color:#fbbf24;line-height:1.5">💡 소비가치 1위 상이 — A: <b>${tA[0]}</b> vs B: <b>${tB[0]}</b></div>`:''})()}
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-top:2px solid #fbbf24;border-radius:12px;padding:16px">
      <div style="font-size:.62rem;font-weight:700;color:#fbbf24;margin-bottom:3px;text-transform:uppercase">D8 · 지불의향</div>
      <div style="font-size:.65rem;color:var(--muted);margin-bottom:10px">구매 소비 유형</div>
      <div style="font-size:.63rem;color:var(--accent);margin-bottom:4px">A</div>
      ${tagList(sA.payMap, sA.topN, 'var(--accent)', sA.total)||'<div style="font-size:.73rem;color:var(--muted)">없음</div>'}

async function runCmpFocus(idA, idB) {
  const q = document.getElementById('cmp-focus-q').value.trim();
  if (!q) { showToast('질문을 입력해주세요.', 'error'); return; }
  const btn = document.getElementById('cmp-focus-run');
  btn.disabled = true; btn.textContent = '응답 생성 중...';

  // 메모리에서 직접 조회
  const psA = memDB.personas.filter(p => p.product_id === idA);
  const psB = memDB.personas.filter(p => p.product_id === idB);
  const pA = psA.map((p,i)=>({...p,color:PERSONA_COLORS[i%PERSONA_COLORS.length],emoji:PERSONA_EMOJIS[i%PERSONA_EMOJIS.length],_prod:'a'}));
  const pB = psB.map((p,i)=>({...p,color:PERSONA_COLORS[(i+3)%PERSONA_COLORS.length],emoji:PERSONA_EMOJIS[(i+3)%PERSONA_EMOJIS.length],_prod:'b'}));

  const colA = document.getElementById('cmp-resp-a');
  const colB = document.getElementById('cmp-resp-b');
  colA.innerHTML = ''; colB.innerHTML = '';

  const all = [...pA, ...pB];
  all.forEach((p, idx) => {
    const name = p.profile_name || p.name || `페르소나${idx+1}`;
    const col = p._prod === 'a' ? colA : colB;
    const card = document.createElement('div'); card.className = 'resp-card'; card.id = 'crc-'+idx;
    card.innerHTML = `<div class="resp-head"><div class="p-av" style="width:30px;height:30px;font-size:.9rem;background:${p.color}1a;border:1.5px solid ${p.color}44;border-radius:50%;display:flex;align-items:center;justify-content:center">${p.emoji}</div><div><div class="resp-name">${name}</div><div class="resp-role">${p.age||''}</div></div></div><div class="resp-text"><div class="dots"><span></span><span></span><span></span></div></div>`;
    col.appendChild(card);
    setTimeout(() => card.classList.add('vis'), idx * 100);
  });

  for (let idx = 0; idx < all.length; idx++) {
    const p = all[idx];
    const name = p.profile_name || p.name || '?';
    const prompt = `당신은 실제 소비자입니다. 구어체로 2~3문장으로 답해주세요.\n특성: ${name}, ${p.age||''}, ${p.job||''}, 가치관: ${p.core_values||p.values||''}, Pain: ${p.pain_points||''}, Unmet: ${p.unmet_needs||''}\n질문: ${q}`;
    try {
      const data = await callAI(prompt, 180);
      document.getElementById('crc-'+idx).querySelector('.resp-text').innerHTML = `<p>${data.text||'오류'}</p>`;
    } catch(e) {
      document.getElementById('crc-'+idx).querySelector('.resp-text').innerHTML = `<p style="color:var(--muted)">응답 오류</p>`;
    }
  }
  btn.disabled = false; btn.textContent = '💬 동시에 물어보기';
}

    {cat:'광고 채널 전략', col:'#c8ff00',
     title:`${topChannel} 중심 퍼포먼스 마케팅`,
     desc:`페르소나 대다수가 ${topChannel}를 주 정보채널로 활용.${hasReview && topPos ? ` 실제 구매자 긍정 키워드 1위 "${topPos}"를 중심으로` : ''} 실사용 언박싱 + 효과 비교 형식의 리뷰 콘텐츠가 구매 결정에 직접 영향.`},
    ...(hasReview && topReason ? [{cat:'구매 동인 메시지', col:'#ff6b6b',
     title:`"${topReason}" 소구 카피 최우선`,
     desc:`실제 구매자 리뷰 분석 결과, 구매 이유 1위는 "${topReason}". ${topReasonDetail} ${topReasonQuote ? `실제 구매자 인용: "${topReasonQuote}"` : ''}`}] : []),
    {cat:'메시지 전략', col:'#ff6b6b',
     title:'Pain Point 직접 해결 카피',
     desc:`페르소나 공통 Pain Points를 직접 해결하는 메시지 설계.${hasReview && topNeg ? ` 실제 리뷰 부정 키워드 1위 "${topNeg}"에 대한 반박 메시지를 선제적으로 준비.` : ''} "이 문제, 해결됩니까?" 형식의 솔직한 소구가 고관여 소비자에게 효과적.`},
    {cat:'타겟 세분화', col:'#b06bff',
     title:'페르소나별 크리에이티브 분리',
     desc:`페르소나 유형(${ps.map(p=>p.profile_name||'?').slice(0,3).join('·')})은 Pain Point가 달라 동일 메시지 불가.${hasReview && topInstall ? ` 주 설치 장소 "${topInstall}" 타깃별 맞춤 소재 별도 제작 필요.` : ' 타겟별 광고 소재 별도 제작 필요.'}`},
    ...(petPct >= 30 ? [{cat:'번들·크로스셀', col:'#6bc5ff',
     title:`반려동물 케어 번들 구성`,
     desc:`${petPct}%가 반려동물 보유. 본제품 + 펫 케어 액세서리 번들 패키지 시 크로스셀 및 객단가 상승 기회.`}] : []),
    ...(childPct >= 30 ? [{cat:'채널 전략', col:'#ffb06b',
     title:'맘카페 + 육아 유튜브 채널',
     desc:`${childPct}%가 자녀 있음. 맘카페 협찬 리뷰 + 육아 유튜브 PPL 집행 시 구매 전환율 높음.`}] : []),
    ...(hasReview && negKws.length >= 2 ? [{cat:'리스크 관리', col:'#f97316',
     title:`부정 키워드 선제 대응 전략`,
     desc:`리뷰 분석 부정 키워드: ${negKws.slice(0,3).map(k=>k.keyword).join(', ')}. 이 키워드들을 상품 상세 페이지와 광고 소재에서 선제적으로 해소하는 Q&A·비교표 콘텐츠 필요.`}] : []),
    {cat:'리뷰 마케팅', col:'#ffb06b',
     title:'씨드 리뷰어 UGC 전략',
     desc:`페르소나 평균 리뷰 작성 수 높음.${hasReview ? ` 현재 리뷰 긍정 키워드(${posKws.slice(0,2).map(k=>k.keyword).join('·')})를 UGC 가이드라인에 반영.` : ''} 구매 후 리뷰 요청 자동화 + 포토리뷰 인센티브 설계 시 UGC 확보 용이.`},
    {cat:'채널 전략', col:'#c8ff00',
     title:'쿠팡 내 광고 최우선 집행',
     desc:`페르소나 대다수 쿠팡 앱 상위 사용. PPC보다 쿠팡 내 상품 노출·로켓배송 최적화가 전환에 직접 영향.`},
    {cat:'콘텐츠 마케팅', col:'#ff6b6b',
     title:`${aesthetics ? aesthetics + ' ' : ''}추구미 기반 SNS 콘텐츠`,
     desc:`페르소나 인테리어·라이프스타일 민감. 제품을 "공간에 녹아드는 라이프스타일"로 포지셔닝한 인스타 릴스 효과적.`},
    {cat:'고객 유지', col:'#b06bff',
     title:'소모품·액세서리 정기배송 리텐션',
     desc:`가성비·효율성 중시 성향. 구매 후 소모품 정기배송 구독 연결 시 LTV 증가 기회.`}
  ];

  // 배너 삽입
  grid.innerHTML = reviewBanner;
  ideas.forEach((idea, i) => {
    idea.n = String(i+1).padStart(2,'0');
    const card = document.createElement('div'); card.className = 'idea-card';
    card.innerHTML = `<div class="idea-num">${idea.n}</div><div class="idea-cat" style="color:${idea.col}">${idea.cat}</div><div class="idea-ttl">${idea.title}</div><div class="idea-desc">${idea.desc}</div>`;
    grid.appendChild(card);
  });
}

// ═══════════════════════ PRODUCT PLANNING ═══════════════════════
function renderProduct() {
  const grid = document.getElementById('product-grid');
  if (grid.children.length > 0) return;
  if (currentPersonas.length === 0) { grid.innerHTML = '<div class="empty-state"><div class="e-icon">📦</div><div class="e-title">데이터 없음</div></div>'; return; }

  const ps = currentPersonas;
  const total = ps.length;
  const petPct = Math.round(ps.filter(p=>p.pet&&!p.pet.includes('없')&&!p.pet.includes('불명')).length/total*100);
  const childPct = Math.round(ps.filter(p=>p.children&&!p.children.includes('없')&&!p.children.includes('불명')).length/total*100);
  const marriedPct = Math.round(ps.filter(p=>(p.married||'').includes('기혼')).length/total*100);
  const unmetList = [...new Set(ps.flatMap(p=>(p.unmet_needs||'').split(/[,·]+/).map(u=>u.trim())).filter(u=>u.length>2))].slice(0,3);
  const aesthetics = [...new Set(ps.map(p=>p.aesthetic).filter(Boolean))].slice(0,2).join('·');

  // ── 리뷰 인사이트 데이터 파싱
  let posKws=[], negKws=[], purchaseReasons=[], installLocs=[], reviewSummary='';
  if (currentInsight) {
    try { posKws = JSON.parse(currentInsight.positive_top5||'[]'); } catch(e){}
    try { negKws = JSON.parse(currentInsight.negative_top5||'[]'); } catch(e){}
    try { purchaseReasons = JSON.parse(currentInsight.purchase_reasons||'[]'); } catch(e){}
    try { installLocs = JSON.parse(currentInsight.install_locations||'[]'); } catch(e){}
    reviewSummary = currentInsight.summary || '';
  }
  const hasReview = currentInsight && posKws.length > 0;
  const topNeg = negKws[0]?.keyword || '';
  const topNegDesc = negKws[0]?.desc || '';
  const topPos = posKws[0]?.keyword || '';
  const topInstall = installLocs[0]?.location || '';
  const topInstallDetail = installLocs[0]?.detail || '';

  const reviewBanner = hasReview
    ? `<div style="background:rgba(200,255,0,.06);border:1px solid rgba(200,255,0,.2);border-radius:10px;padding:12px 18px;margin-bottom:20px;display:flex;align-items:center;gap:10px">
        <span style="font-size:1rem">🔗</span>
        <div>
          <span style="font-size:.72rem;color:var(--accent);font-weight:700">리뷰 인사이트 연동됨</span>
          <span style="font-size:.7rem;color:var(--muted);margin-left:8px">${currentInsight.review_count||0}개 리뷰 분석 반영</span>
        </div>
      </div>`
    : `<div style="background:rgba(107,197,255,.04);border:1px solid rgba(107,197,255,.15);border-radius:10px;padding:10px 18px;margin-bottom:20px;font-size:.75rem;color:var(--muted)">
        💡 <strong style="color:var(--accent3)">리뷰 인사이트 탭</strong>에서 분석을 완료하면 실제 고객 목소리 기반의 기획 인사이트가 추가됩니다.
      </div>`;

  const ideas = [
    {cat:'기능 기획', col:'#c8ff00',
     title:'Unmet Needs 기반 핵심 기능 도출',
     desc:`페르소나 미충족 니즈: ${unmetList.length ? unmetList.join(', ') : '데이터 수집 중'}.${hasReview && topNeg ? ` 실제 리뷰 부정 키워드 1위 "${topNeg}"(${topNegDesc}) — 이 점을 직접 해결하는 기능을 최우선 로드맵에 반영해야 함.` : ' 이 니즈를 직접 해결하는 기능을 최우선 로드맵에 반영해야 함.'}`},
    ...(hasReview && negKws.length >= 2 ? [{cat:'개선 우선순위', col:'#f97316',
     title:`실제 고객 불만 TOP${Math.min(negKws.length,3)} 해결 로드맵`,
     desc:`리뷰 분석 부정 키워드: ${negKws.slice(0,3).map((k,i)=>`${i+1}위 "${k.keyword}"(${k.mention_count||0}건)`).join(', ')}. 언급 빈도 순으로 제품 개선 우선순위를 설정하고 다음 버전 스펙에 반영 권고.`}] : []),
    {cat:'UX/UI 기획', col:'#ff6b6b',
     title:'IT 숙련도 기반 인터페이스 설계',
     desc:`페르소나 IT 수준이 중상~높음.${hasReview && topPos ? ` 실제 리뷰 긍정 1위 "${topPos}" — 이 경험을 UX 핵심 가치로 유지하며` : ''} 복잡한 설정 없이 직관적으로 쓸 수 있는 UX + 앱 연동 기능이 만족도에 직접 영향.`},
    ...(hasReview && installLocs.length > 0 ? [{cat:'설치·환경 최적화', col:'#6bc5ff',
     title:`주 설치 환경(${topInstall}) 특화 설계`,
     desc:`리뷰 분석 결과 주 설치 장소 ${installLocs.map(l=>`${l.location}(${l.pct}%)`).join(', ')}. ${topInstall} 환경에 최적화된 크기·소음·배기 설계 필요. ${topInstallDetail}`}] : []),
    ...(petPct >= 30 ? [{cat:'특화 기능', col:'#6bc5ff',
     title:`반려동물 특화 기능 추가 (${petPct}% 니즈)`,
     desc:`${petPct}%가 반려동물 보유. 펫 전용 코스(저온·탈취·털 필터 강화 등) 탑재 시 명확한 구매 이유 생성 및 차별화 포인트 확보.`}] : []),
    ...(childPct >= 30 ? [{cat:'안전·위생', col:'#ffb06b',
     title:`영유아 안전 인증 및 위생 기능 (${childPct}% 니즈)`,
     desc:`${childPct}%가 자녀 있음. KC 인증·스팀 살균·항균 소재 등 아이 안전 관련 스펙 강화 시 워킹맘 구매 전환율 향상.`}] : []),
    ...(marriedPct >= 40 ? [{cat:'용량·구성', col:'#b06bff',
     title:'가족 단위 용량 라인업 확장',
     desc:`${marriedPct}%가 기혼 가구. 4인 가족 기준 빨래량을 소화하는 대용량 모델 추가 시 가족 타겟 업셀 기회.`}] : []),
    {cat:'디자인 기획', col:'#ff6b6b',
     title:`${aesthetics ? aesthetics + ' ' : ''}추구미 기반 CMF 전략`,
     desc:`페르소나 인테리어 민감도 높음. 제품 색상·소재·형태(CMF)를 공간 인테리어와 어울리는 방향으로 설계 시 구매 결정 요인 추가.`},
    {cat:'패키징·설치', col:'#c8ff00',
     title:'방문설치·초기 경험 설계',
     desc:`설치 편의성이 구매 이유로 언급됨.${hasReview ? ` 리뷰 긍정 키워드에서도 설치 경험이 상위 언급.` : ''} 방문설치 포함 옵션 유지 + 설치 후 첫 사용 가이드 동봉 시 초기 만족도 향상.`},
    {cat:'가격 전략', col:'#6bc5ff',
     title:'가성비 포지셔닝 또는 프리미엄 분리',
     desc:`페르소나 소득 중산층 집중.${hasReview && negKws.some(k=>k.keyword.includes('가격')||k.keyword.includes('비싸')) ? ' 실제 리뷰에서 가격 부담이 부정 키워드로 언급됨 — 가성비 라인 포지셔닝 강화 또는 할부 혜택 전면 배치 고려.' : ' 가성비 라인과 프리미엄 라인을 명확히 분리해 각각 다른 구매 동인에 소구하는 라인업 전략 필요.'}`},
    {cat:'A/S·신뢰', col:'#b06bff',
     title:'방문 A/S 보장을 핵심 스펙으로',
     desc:`A/S 접근성이 구매 결정에 직접 영향. 방문 A/S 보장·무상 기간 연장·빠른 응대를 스펙 페이지 상단에 배치해야 함.`}
  ];

  grid.innerHTML = reviewBanner;
  ideas.forEach((idea, i) => {
    idea.n = String(i+1).padStart(2,'0');
    const card = document.createElement('div'); card.className = 'idea-card';
    card.innerHTML = `<div class="idea-num">${idea.n}</div><div class="idea-cat" style="color:${idea.col}">${idea.cat}</div><div class="idea-ttl">${idea.title}</div><div class="idea-desc">${idea.desc}</div>`;
    grid.appendChild(card);
  });
}

// ═══════════════════════ TOAST ═══════════════════════
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => { t.classList.remove('show'); }, 3500);
}
</script>
</body>
</html>
